---
vm_workloads:
  acronyms:
    # Standard acronym:
    # §name : vmname
    # §time : duration of scope
    # §target_avg : CPU usage target average
    §folder: "tools"
    §ssh: "sshvm.sh"
  workloads:
    idle:
      constraint:
        freq: 0.20
        usage:
          - low
      command: "sleep §time"
    stressng:
      constraint:
        freq: 0.20
      acronyms:
        §value: "§target_avg"
      command: "§folder/§ssh §name \"stress-ng --timeout §time -c 0 -l §value \""
    wordpress:
      constraint:
        freq: 0.20
      acronyms:
        §value: "math.ceil(§target_avg/10) + 1" 
      command: "§folder/wp.sh §name §time §value"
    dsb:
      constraint:
        freq: 0.20
        mem:
          min: 7
      acronyms:
        §value:  math.ceil(§target_avg*10) + 1" 
      command: "§folder/dsb.sh §name §time §value"
    tpcc:
      constraint:
        freq: 0.20
      command: "§folder/tpcc.sh §name §time §value"
      acronyms:
        §value: "max(math.ceil(§target_avg/10) + 1, 20000)"